name: Gmail Bulk Mailer

on:
  schedule:
    # 5 runs per day — 10 emails each = 50 total
    # All times UTC (IST = UTC + 5:30), Monday–Saturday only (0=Sun, 6=Sat)
    - cron: '0 4 * * 1-6'    # 09:30 IST
    - cron: '12 5 * * 1-6'   # 10:42 IST
    - cron: '24 6 * * 1-6'   # 11:54 IST
    - cron: '36 7 * * 1-6'   # 13:06 IST
    - cron: '48 8 * * 1-6'   # 14:18 IST
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit state file back

jobs:
  send-chunk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout Helper Files
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.ASSETS_REPO }}
          token: ${{ secrets.ASSETS_PAT }}
          path: Helper_Files

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send email chunk
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          EXCEL_FILE:     ${{ secrets.EXCEL_FILE }}
          RESUME_PATH:    ${{ secrets.RESUME_PATH }}
        run: python email_scheduler.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mailer_state.json
          git diff --staged --quiet || git commit -m "chore: update mailer state [skip ci]"
          git push
